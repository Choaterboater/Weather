name: BiteCast
options:
  bundleIdPrefix: app.choatelabs
  deploymentTarget:
    iOS: "26.5"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BiteCast:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.choatelabs.bitecast
        INFOPLIST_FILE: Sources/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Support/BiteCast.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: RAYW3WPJ98

  BiteCastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: BiteCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.choatelabs.bitecast.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BiteCast:
    build:
      targets:
        BiteCast: all
        BiteCastTests: [test]
    test:
      targets:
        - BiteCastTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
