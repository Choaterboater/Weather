name: BiteCast
options:
  bundleIdPrefix: app.choatelabs
  deploymentTarget:
    iOS: "26.5"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  BiteCast:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Support/Info.plist
          - Support/Info-Debug.plist
    # Injects gitignored API keys into local Debug builds only. Release uses a
    # separate plist that cannot embed the long-lived service credentials.
    configFiles:
      Debug: AppConfig.xcconfig
      Release: ReleaseConfig.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.choatelabs.bitecast
        INFOPLIST_FILE: Sources/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Support/BiteCast.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: RAYW3WPJ98
      configs:
        Debug:
          INFOPLIST_FILE: Sources/Support/Info-Debug.plist

  BiteCastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: BiteCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.choatelabs.bitecast.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RAYW3WPJ98

  BiteCastUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: BiteCast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.choatelabs.bitecast.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RAYW3WPJ98

schemes:
  BiteCast:
    build:
      targets:
        BiteCast: all
        BiteCastTests: [test]
        BiteCastUITests: [test]
    test:
      targets:
        - BiteCastTests
        - BiteCastUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
